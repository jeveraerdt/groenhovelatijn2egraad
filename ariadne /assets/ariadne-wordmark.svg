<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 120" role="img" aria-labelledby="title desc">
  <title id="title">Ariadne woordmerk</title>
  <desc id="desc">Het woord ARIADNE in zwart, met een subtiel draadeinde aan de E.</desc>
  <g fill="#111111">
    <text x="0" y="78"
      font-family="Inter, Avenir Next, Noto Sans, Helvetica Neue, Arial, sans-serif"
      font-size="72"
      font-weight="500"
      letter-spacing="24">ARIADN</text>
  </g>

  <!-- Custom E: R remains pure; only E has the thread-like ending. -->
  <g transform="translate(640 27)" fill="none" stroke="#111111" stroke-width="9" stroke-linecap="butt" stroke-linejoin="miter">
    <path d="M0 0 V58"/>
    <path d="M0 0 H72"/>
    <path d="M0 29 H58"/>
    <path d="M0 58 H54"/>
    <path d="M54 58 C70 58, 76 66, 91 62 C100 60, 105 56, 111 58" stroke-linecap="round"/>
  </g>
</svg>
