<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="title desc">
  <title id="title">Ariadne wolkluwen</title>
  <desc id="desc">Een minimalistisch gouden bol wol met een los draadje.</desc>
