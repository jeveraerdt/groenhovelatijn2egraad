<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leraarsdashboard — Groenhove Latijn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --groen: #006633;
      --groen-licht: #e8f5ee;
      --groen-mid: #65b32e;
      --accent: #FF3B1D;
      --wit: #f3f1ef;
      --zwart: #010100;
      --grijs: #6b7280;
      --border: #e5e7eb;
      --font-titel: 'Flanders Art Sans', 'Noto Sans', sans-serif;
      --font-body: 'Noto Sans', Arial, sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--wit);
      color: var(--zwart);
      min-height: 100vh;
    }

    header {
      background: var(--groen);
      color: white;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo-img {
      height: 34px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }

    .header-title {
      font-family: var(--font-titel);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .header-sub {
      font-size: 12px;
      opacity: 0.75;
      font-weight: 400;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    #auth-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-uitloggen {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-body);
      transition: background 0.2s;
    }

    .btn-uitloggen:hover { background: rgba(255,255,255,0.25); }

    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 40px 20px;
    }

    .login-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.1);
      padding: 48px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(0,102,51,.08);
    }

    .login-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 18px;
      border-radius: 20px;
      background: var(--groen-licht);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-icon img {
      height: 42px;
      width: auto;
      display: block;
    }

    .login-card h2 {
      font-family: var(--font-titel);
      color: var(--groen);
      font-size: 22px;
      margin-bottom: 8px;
    }

    .login-card p {
      color: var(--grijs);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: left;
    }

    .login-form label {
      font-size: 13px;
      font-weight: 700;
      color: var(--groen);
    }

    .login-form input {
      width: 100%;
      margin-top: 6px;
      padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      background: #fff;
    }

    .login-form input:focus {
      outline: none;
      border-color: var(--groen);
      box-shadow: 0 0 0 3px rgba(0,102,51,.12);
    }

    .login-form button {
      margin-top: 8px;
      background: var(--groen);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .15s;
    }

    .login-form button:hover {
      background: #00522a;
      transform: translateY(-1px);
    }

    .login-form button:disabled {
      opacity: .6;
      cursor: default;
      transform: none;
    }

    .login-error {
      color: var(--accent);
      font-size: 13px;
      margin-top: 12px;
      display: none;
      line-height: 1.4;
    }

    #dashboard { display: none; padding: 32px; max-width: 1200px; margin: 0 auto; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .stat-label {
      font-size: 12px;
      color: var(--grijs);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--font-titel);
      font-size: 32px;
      font-weight: 700;
      color: var(--groen);
    }

    .stat-sub { font-size: 12px; color: var(--grijs); margin-top: 2px; }

    .sectie {
      background: white;
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .sectie-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--groen-licht);
    }

    .sectie-titel {
      font-family: var(--font-titel);
      font-size: 15px;
      font-weight: 700;
      color: var(--groen);
    }

    .badge {
      background: var(--groen);
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--grijs);
      background: #fafafa;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover { background: var(--groen-licht); }
    tbody tr:last-child { border-bottom: none; }

    td { padding: 10px 16px; }

    .td-email { color: var(--grijs); font-size: 13px; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--groen-mid);
      transition: width 0.5s ease;
    }

    .progress-fill.hoog { background: var(--groen); }
    .progress-fill.laag { background: var(--accent); }

    .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }

    .chip-les1 { background: #dbeafe; color: #1d4ed8; }
    .chip-les2 { background: #fef3c7; color: #92400e; }
    .chip-geen { background: #f3f4f6; color: var(--grijs); }

    .btn-refresh {
      background: var(--groen);
      color: white;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .btn-refresh:hover { background: #00522a; }
    .btn-refresh:disabled { opacity: 0.5; cursor: default; }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--grijs);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--groen);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .laatste-update {
      font-size: 12px;
      color: var(--grijs);
      text-align: right;
      margin-bottom: 16px;
    }

    .leeg {
      text-align: center;
      padding: 32px;
      color: var(--grijs);
      font-size: 14px;
    }

    @media (max-width: 760px) {
      header { padding: 0 18px; }
      #dashboard { padding: 20px 14px; }
      .login-card { padding: 32px 24px; }
      .header-sub { display: none; }
      table { min-width: 720px; }
      .sectie { overflow-x: auto; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img class="header-logo-img" src="images/nav/logo_mono_wit.png" alt="Groenhove Latijn">
    <div>
      <div class="header-title">Groenhove Latijn</div>
      <div class="header-sub">Leraarsdashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div id="auth-status"></div>
  </div>
</header>

<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">
      <img src="images/nav/logo.svg" alt="Groenhove Latijn">
    </div>
    <h2>Leraarsdashboard</h2>
    <p>Log in om het leraarsdashboard te openen.</p>

    <form id="login-form" class="login-form">
      <label>
        Loginnaam
        <input id="login-naam" type="text" autocomplete="username" required>
      </label>

      <label>
        Paswoord
        <input id="login-wachtwoord" type="password" autocomplete="current-password" required>
      </label>

      <button id="login-submit" type="submit">Inloggen</button>
    </form>

    <p class="login-error" id="login-error"></p>
  </div>
</div>

<div id="dashboard">
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Leerlingen</div>
      <div class="stat-value" id="stat-leerlingen">—</div>
      <div class="stat-sub">ingelogd dit schooljaar</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Les 1 voltooid</div>
      <div class="stat-value" id="stat-les1">—</div>
      <div class="stat-sub">leerlingen</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Les 2 voltooid</div>
      <div class="stat-value" id="stat-les2">—</div>
      <div class="stat-sub">leerlingen</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Gem. score</div>
      <div class="stat-value" id="stat-gem">—</div>
      <div class="stat-sub">over alle lessen</div>
    </div>
  </div>

  <p class="laatste-update" id="laatste-update"></p>

  <div class="sectie">
    <div class="sectie-header">
      <span class="sectie-titel">Leerlingenoverzicht</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="badge" id="badge-leerlingen">0</span>
        <button class="btn-refresh" id="btn-refresh" onclick="laadData()">
          ↺ Vernieuwen
        </button>
      </div>
    </div>
    <div id="tabel-leerlingen">
      <div class="loading"><span class="spinner"></span> Data laden…</div>
    </div>
  </div>

  <div class="sectie">
    <div class="sectie-header">
      <span class="sectie-titel">Voortgang per les</span>
      <span class="badge" id="badge-voortgang">0</span>
    </div>
    <div id="tabel-voortgang">
      <div class="loading"><span class="spinner"></span> Data laden…</div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
appsScriptUrl: 'https://script.google.com/macros/s/AKfycbw5hzoZuYf5aP0ZNaWXY4ZnCxtlcoqMinxktjTMKGywCpXGG5J7YtOodauz2qo1cKUC/exec',  userKey: 'groenhove_dash_user',
  expiryKey: 'groenhove_dash_expiry',
};

let huidigGebruiker = null;

window.addEventListener('DOMContentLoaded', () => {
  if (isSessionGeldig()) {
    huidigGebruiker = getStoredUser();
    toonDashboard();
  } else {
    const form = document.getElementById('login-form');
    if (form) form.addEventListener('submit', handleLogin);
  }
});

function isSessionGeldig() {
  const expiry = localStorage.getItem(CONFIG.expiryKey);
  const user = localStorage.getItem(CONFIG.userKey);
  return expiry && user && Date.now() < parseInt(expiry, 10);
}

function getStoredUser() {
  try {
    return JSON.parse(localStorage.getItem(CONFIG.userKey));
  } catch {
    return null;
  }
}

async function handleLogin(e) {
  e.preventDefault();

  const errorEl = document.getElementById('login-error');
  const submitBtn = document.getElementById('login-submit');
  errorEl.style.display = 'none';

  const loginnaam = document.getElementById('login-naam').value.trim();
  const wachtwoord = document.getElementById('login-wachtwoord').value;

  submitBtn.disabled = true;
  submitBtn.textContent = 'Controleren…';

  try {
    const result = await fetch(CONFIG.appsScriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'teacherLogin',
        loginnaam,
        wachtwoord
      }),
    });

    const data = await result.json();

    if (data.ok) {
      huidigGebruiker = {
        naam: data.naam || loginnaam,
        email: data.email || ''
      };

      const expiry = Date.now() + 8 * 60 * 60 * 1000;
      localStorage.setItem(CONFIG.userKey, JSON.stringify(huidigGebruiker));
      localStorage.setItem(CONFIG.expiryKey, String(expiry));

      toonDashboard();
    } else {
      errorEl.textContent = '⚠️ Loginnaam of paswoord is niet correct.';
      errorEl.style.display = 'block';
    }
  } catch (err) {
    errorEl.textContent = '⚠️ Verbindingsfout. Probeer opnieuw.';
    errorEl.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Inloggen';
  }
}

function uitloggen() {
  localStorage.removeItem(CONFIG.userKey);
  localStorage.removeItem(CONFIG.expiryKey);
  location.reload();
}

function toonDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  const naam = huidigGebruiker?.naam || huidigGebruiker?.email?.split('@')[0] || 'Jens';
  document.getElementById('auth-status').innerHTML = `
    <span style="opacity:0.85;">${escapeHtml(naam)}</span>
    <button class="btn-uitloggen" onclick="uitloggen()">Uitloggen</button>
  `;

  laadData();
}

async function laadData() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  btn.textContent = '↺ Laden…';

  try {
    const url = CONFIG.appsScriptUrl + '?action=getDashboard&t=' + Date.now();
    const res = await fetch(url);
    const data = await res.json();

    if (data.ok) {
      verwerkData(data);
      document.getElementById('laatste-update').textContent =
        'Laatste update: ' + new Date().toLocaleTimeString('nl-BE');
    } else {
      toonFout('Kon data niet laden: ' + (data.error || ''));
    }
  } catch (err) {
    toonFout('Verbindingsfout: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '↺ Vernieuwen';
  }
}

function verwerkData(data) {
  const leerlingen = Array.isArray(data.leerlingen) ? data.leerlingen : [];
  const voortgang = Array.isArray(data.voortgang) ? data.voortgang : [];

  document.getElementById('stat-leerlingen').textContent = leerlingen.length;
  document.getElementById('badge-leerlingen').textContent = leerlingen.length;

  const les1Set = new Set(voortgang.filter(v => v.les === 'les1').map(v => v.email));
  const les2Set = new Set(voortgang.filter(v => v.les === 'les2').map(v => v.email));
  document.getElementById('stat-les1').textContent = les1Set.size;
  document.getElementById('stat-les2').textContent = les2Set.size;

  const scores = voortgang.filter(v => v.procent !== undefined && v.procent !== '').map(v => parseInt(v.procent, 10)).filter(n => !isNaN(n));
  const gem = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : null;
  document.getElementById('stat-gem').textContent = gem !== null ? gem + '%' : '—';

  renderLeerlingen(leerlingen, voortgang, les1Set, les2Set);
  renderVoortgang(voortgang);
  document.getElementById('badge-voortgang').textContent = voortgang.length;
}

function renderLeerlingen(leerlingen, voortgang, les1Set, les2Set) {
  const container = document.getElementById('tabel-leerlingen');

  if (!leerlingen.length) {
    container.innerHTML = '<div class="leeg">Nog geen leerlingen geregistreerd.</div>';
    return;
  }

  const voortgangPerEmail = {};
  voortgang.forEach(v => {
    if (!voortgangPerEmail[v.email]) voortgangPerEmail[v.email] = [];
    voortgangPerEmail[v.email].push(v);
  });

  const rows = leerlingen.map(l => {
    const email = l.email || '';
    const vp = voortgangPerEmail[email] || [];
    const heeftLes1 = les1Set.has(email);
    const heeftLes2 = les2Set.has(email);
    const scores = vp.filter(v => v.procent !== undefined && v.procent !== '').map(v => parseInt(v.procent, 10)).filter(n => !isNaN(n));
    const gem = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : null;
    const datum = l.laatsteLogin ? new Date(l.laatsteLogin).toLocaleDateString('nl-BE') : '—';

    return `
      <tr>
        <td><strong>${escapeHtml(l.naam || '—')}</strong></td>
        <td class="td-email">${escapeHtml(email)}</td>
        <td>
          ${heeftLes1 ? '<span class="chip chip-les1">Les 1 ✓</span>' : '<span class="chip chip-geen">Les 1</span>'}
          ${heeftLes2 ? ' <span class="chip chip-les2">Les 2 ✓</span>' : ' <span class="chip chip-geen">Les 2</span>'}
        </td>
        <td>
          ${gem !== null ? `
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="progress-bar" style="width:80px;">
                <div class="progress-fill ${gem >= 70 ? 'hoog' : gem < 50 ? 'laag' : ''}"
                     style="width:${gem}%"></div>
              </div>
              <span style="font-size:13px;">${gem}%</span>
            </div>
          ` : '<span style="color:#9ca3af;font-size:13px;">geen data</span>'}
        </td>
        <td style="color:var(--grijs);font-size:13px;">${datum}</td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Naam</th>
          <th>E-mail</th>
          <th>Lessen</th>
          <th>Gem. score</th>
          <th>Laatste login</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderVoortgang(voortgang) {
  const container = document.getElementById('tabel-voortgang');

  if (!voortgang.length) {
    container.innerHTML = '<div class="leeg">Nog geen voortgang geregistreerd.</div>';
    return;
  }

  const gesorteerd = [...voortgang].sort((a, b) => new Date(b.datum || 0) - new Date(a.datum || 0));

  const rows = gesorteerd.slice(0, 50).map(v => {
    const procent = v.procent !== undefined && v.procent !== '' ? parseInt(v.procent, 10) : null;
    const datum = v.datum ? new Date(v.datum).toLocaleString('nl-BE', {
      day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
    }) : '—';

    return `
      <tr>
        <td class="td-email">${escapeHtml(v.email || '—')}</td>
        <td><span class="chip ${v.les === 'les1' ? 'chip-les1' : 'chip-les2'}">${escapeHtml(v.les || '—')}</span></td>
        <td style="font-size:13px;color:var(--grijs);">${escapeHtml(v.onderdeel || '—')}</td>
        <td>
          ${procent !== null && !isNaN(procent) ? `
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="progress-bar" style="width:60px;">
                <div class="progress-fill ${procent >= 70 ? 'hoog' : procent < 50 ? 'laag' : ''}"
                     style="width:${procent}%"></div>
              </div>
              <span style="font-size:13px;">${escapeHtml(v.score || '0')}/${escapeHtml(v.maxScore || '0')} (${procent}%)</span>
            </div>
          ` : '—'}
        </td>
        <td style="color:var(--grijs);font-size:12px;">${datum}</td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Leerling</th>
          <th>Les</th>
          <th>Onderdeel</th>
          <th>Score</th>
          <th>Datum</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    ${gesorteerd.length > 50 ? `<p style="padding:12px 16px;font-size:12px;color:var(--grijs);">Toont laatste 50 van ${gesorteerd.length} registraties.</p>` : ''}
  `;
}

function toonFout(bericht) {
  document.getElementById('tabel-leerlingen').innerHTML =
    `<div class="leeg" style="color:var(--accent);">⚠️ ${escapeHtml(bericht)}</div>`;
  document.getElementById('tabel-voortgang').innerHTML = '';
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
</script>
</body>
</html>
